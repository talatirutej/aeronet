finetune_freeze_encoder: false
loss_cfg:
  enable_force_loss: false
  enable_smooth_loss: false
  pressure_weight: 1.0
  smooth_k: 8
  tau_weight: 1.0
  w_field: 1.0
  w_force: 0.0
  w_smooth: 0.0
model_cfg:
  bottleneck_dim: 128
  bottleneck_dropout: 0.1
  bottleneck_heads: 4
  bottleneck_layers: 2
  fp1_mlp: !!python/tuple
  - 128
  - 128
  - 128
  fp2_mlp: !!python/tuple
  - 256
  - 128
  fp3_mlp: !!python/tuple
  - 256
  - 256
  global_dim: 4
  head_dropout: 0.1
  head_hidden: !!python/tuple
  - 128
  - 64
  n_input_points: 2048
  output_channels: 4
  sa1_centroids: 512
  sa1_mlps: !!python/tuple
  - &id001 !!python/tuple
    - 32
    - 32
    - 64
  - *id001
  sa1_radii: !!python/tuple
  - 0.05
  - 0.1
  sa1_samples: &id002 !!python/tuple
  - 16
  - 32
  sa2_centroids: 128
  sa2_mlps: !!python/tuple
  - !!python/tuple
    - 64
    - 64
    - 128
  - !!python/tuple
    - 64
    - 96
    - 128
  sa2_radii: !!python/tuple
  - 0.1
  - 0.2
  sa2_samples: *id002
  sa3_centroids: 32
  sa3_mlps: !!python/tuple
  - &id003 !!python/tuple
    - 128
    - 196
    - 256
  - *id003
  sa3_radii: !!python/tuple
  - 0.2
  - 0.4
  sa3_samples: *id002
  use_normals: true
normalization:
  p_mean: 0.0
  p_std: 1.0
  tau_mean:
  - 0.0
  - 0.0
  - 0.0
  tau_std:
  - 1.0
  - 1.0
  - 1.0
optim_cfg:
  betas: !!python/tuple
  - 0.9
  - 0.95
  grad_clip: 1.0
  lr: 0.0005
  max_steps: 200
  min_lr_ratio: 0.1
  warmup_steps: 5
  weight_decay: 0.0
